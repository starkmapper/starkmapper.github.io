site_name: Mark Stapper's Blog
site_url: https://starkmapper.github.io
repo_url: https://github.com/starkmapper/starkmapper.github.io
docs_dir: content

theme:
  name: material
  palette: 
    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/weather-night
        name: Switch to dark mode

    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

markdown_extensions:
  - abbr
  - def_list
  - footnotes
  - tables
  - pymdownx.blocks.tab:
      alternate_style: true
  - pymdownx.blocks.admonition
  - toc:
      permalink: true


plugins:
  - git-authors
  - tags
  - i18n:
      docs_structure: suffix
      fallback_to_default: true
      languages:
        - locale: en
          name: English
          build: true
          default: true
        - locale: nl
          name: Nederlands
          build: true
          nav_translations:
            Home: Startpagina
            Developer Stances: Developer Stances
            Connect: Verbinden
            Scrum 4 Kids: Scrum 4 Kids
            "Work in Progress": "In Ontwikkeling"
